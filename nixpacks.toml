[phases.setup]
nixPkgs = ['php82', 'php82Packages.composer', 'nodejs_20', 'npm']

[phases.install]
dependsOn = ['setup']
cmds = [
    'composer install --optimize-autoloader --no-dev --no-interaction',
    'npm install && npm run build',
    'chmod -R 775 storage bootstrap/cache'
]

[phases.build]
dependsOn = ['install']
cmds = ['php artisan optimize:clear']

[start]
cmd = "sleep 5 && php artisan migrate --force && php artisan view:cache && php artisan route:cache && php artisan serve --host 0.0.0.0 --port $PORT"