[phases.setup]
nixPkgs = ["php82", "php82Packages.composer", "nodejs_20"]

[phases.install]
cmds = ["composer install --optimize-autoloader --no-dev --no-interaction", "npm install && npm run build"]

[phases.build]
cmds = ["php artisan optimize:clear"]

[start]
cmd = "php artisan migrate --force && php artisan optimize && php artisan serve --host 0.0.0.0 --port $PORT"
